<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Language Practice Hub Pro</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg-light: #f8fafc;
      --card-light: #ffffff;
      --text-light: #1e293b;
      --bg-dark: #0f172a;
      --card-dark: #1e293b;
      --text-dark: #f1f5f9;
    }

    * { box-sizing: border-box; margin:0; padding:0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    
    body { background-color: var(--bg-light); color: var(--text-light); transition: 0.3s ease; min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    body.dark-mode { background-color: var(--bg-dark); color: var(--text-dark); }

    h1 { margin-bottom: 20px; font-weight: 800; letter-spacing: -1px; }

    /* Navigation */
    .menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 30px; background: rgba(255,255,255,0.5); padding: 10px; border-radius: 15px; backdrop-filter: blur(10px); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    .menu button { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; background: transparent; color: inherit; transition: 0.2s; }
    .menu button.active { background: var(--primary); color: white; }
    .menu button:hover:not(.active) { background: rgba(0,0,0,0.05); }

    .section { display: none; width: 100%; max-width: 800px; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .visible { display: block; }

    /* Cards */
    .card { background: var(--card-light); padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
    body.dark-mode .card { background: var(--card-dark); }

    /* Matching Quiz Styles */
    .matching-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .match-item { padding: 15px; background: #eee; border: 2px solid transparent; border-radius: 10px; cursor: grab; text-align: center; font-weight: 600; }
    .match-item.selected { border-color: var(--primary); background: #e0e7ff; }
    .match-item.correct { background: #dcfce7; color: #166534; cursor: default; }
    body.dark-mode .match-item { background: #334155; }

    /* Inputs & Buttons */
    input { padding: 12px; font-size: 1.1em; width: 100%; max-width: 300px; border-radius: 10px; border: 2px solid #e2e8f0; margin: 10px 0; outline: none; }
    input:focus { border-color: var(--primary); }
    .btn-main { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; margin: 5px; }
    .btn-speaker { background: #e2e8f0; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-left: 10px; }

    table { width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 10px; overflow: hidden; }
    th { background: var(--primary); color: white; padding: 12px; }
    td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: center; }

    .chat-container { display: flex; flex-direction: column; gap: 10px; }
    .bubble { padding: 12px; border-radius: 15px; max-width: 80%; }
    .xiaoli { align-self: flex-start; background: #e0e7ff; color: #1e293b; }
    .xiaowang { align-self: flex-end; background: #d1fae5; color: #064e3b; }
  </style>
</head>
<body>

  <h1>🌏 Language Practice Hub</h1>

  <div class="menu">
    <button id="menu-vocab" class="active" onclick="showSection('vocab')">Flashcards</button>
    <button id="menu-match" onclick="showSection('match')">Matching Game</button>
    <button id="menu-paragraph" onclick="showSection('paragraph')">Reading</button>
    <button id="menu-conversation" onclick="showSection('conversation')">Chat</button>
    <button id="menu-list" onclick="showSection('vocabList')">Library</button>
    <button id="menu-retry" onclick="showSection('retry')">Mistakes</button>
    <button onclick="toggleDarkMode()">🌓</button>
  </div>

  <div id="vocab" class="section visible">
    <div class="card">
      <select id="chapterSelect" onchange="loadChapter()" style="padding:8px; border-radius:5px;">
        <option value="">-- Choose Chapter --</option>
      </select>
      <div style="font-size: 2.5em; margin: 20px 0; font-weight: bold;" id="word">Select a Chapter</div>
      <button class="btn-speaker" onclick="speakCurrentWord()">🔊 Listen</button>
      <br><br>
      <input type="text" id="answer" placeholder="Type Chinese translation...">
      <br>
      <button class="btn-main" onclick="checkAnswer()">Check Answer</button>
      <div id="status" style="margin-top:15px; font-weight:600;"></div>
      <div id="counter" style="font-size:0.9em; color:#64748b; margin-top:10px;"></div>
    </div>
  </div>

  <div id="match" class="section">
    <div class="card">
      <h2>Word Matching</h2>
      <p>Click an English word, then click its Chinese pair!</p>
      <div id="matchingBoard" class="matching-container">
        </div>
      <button class="btn-main" style="margin-top:20px" onclick="loadMatchingGame()">New Game</button>
    </div>
  </div>

  <div id="paragraph" class="section">
    <div class="card">
      <h2>Reading Practice</h2>
      <select id="paragraphSelect" onchange="loadParagraph()" style="margin:15px 0; padding:8px;"></select>
      <div id="paragraphText" style="line-height:2; font-size:1.2em; text-align:left; background:#f1f5f9; padding:20px; border-radius:10px; color:#1e293b;"></div>
    </div>
  </div>

  <div id="conversation" class="section">
    <div class="card">
      <h2>Dialogue</h2>
      <select id="conversationSelect" onchange="loadConversation()" style="margin:15px 0; padding:8px;"></select>
      <div id="conversationText" class="chat-container"></div>
    </div>
  </div>

  <div id="vocabList" class="section"></div>
  <div id="retry" class="section">
    <div class="card">
      <h2>Review Your Mistakes</h2>
      <button class="btn-main" style="background:#ef4444" onclick="clearRetryHistory()">Clear History</button>
      <table id="retryTable">
        <thead><tr><th>English</th><th>Correct Chinese</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    let vocabData = {}, paragraphData = {}, conversationData = {};
    let vocab = [], usedIndices = new Set(), current = {};
    let wrongWords = JSON.parse(localStorage.getItem('wrongWords') || '[]');
    let selectedMatch = null;

    function toggleDarkMode(){ document.body.classList.toggle('dark-mode'); }

    // FETCH DATA
    Promise.all([
      fetch('HSK 6.json').then(r=>r.json()).catch(()=> ({ "Demo": [{"A":"你好", "B":"Hello"}] })),
      fetch('Paragraph.json').then(r=>r.json()).catch(()=> ({})),
      fetch('Conversation.json').then(r=>r.json()).catch(()=> ({}))
    ]).then(([v,p,c])=>{
      vocabData=v; paragraphData=p; conversationData=c;
      populateDropdowns();
      updateRetryTable();
    });

    function populateDropdowns(){
      populateDropdown('chapterSelect',vocabData);
      populateDropdown('paragraphSelect',paragraphData);
      populateDropdown('conversationSelect',conversationData);
    }

    function populateDropdown(id,data){
      const select=document.getElementById(id);
      Object.keys(data).forEach(ch=>{
        const o=document.createElement('option');
        o.value=ch; o.textContent=ch;
        select.appendChild(o);
      });
    }

    function showSection(id){
      document.querySelectorAll('.section').forEach(s=>s.classList.remove('visible'));
      document.getElementById(id).classList.add('visible');
      document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('active'));
      document.getElementById('menu-'+id).classList.add('active');
      if(id==='match') loadMatchingGame();
      if(id==='vocabList') loadVocabList();
    }

    // VOCOB LOGIC
    function loadChapter(){
      const ch=document.getElementById('chapterSelect').value;
      if(!ch) return;
      vocab=vocabData[ch];
      usedIndices.clear();
      showRandomWord();
    }

    function showRandomWord(){
      if(usedIndices.size === vocab.length){
        document.getElementById('word').textContent="Chapter Complete! 🎉";
        return;
      }
      let i;
      do{ i=Math.floor(Math.random()*vocab.length); }while(usedIndices.has(i));
      usedIndices.add(i);
      current = vocab[i];
      document.getElementById('word').textContent = current.B;
      document.getElementById('answer').value = '';
      document.getElementById('status').textContent = '';
      document.getElementById('counter').textContent = `Progress: ${usedIndices.size} / ${vocab.length}`;
    }

    function checkAnswer(){
      const input = document.getElementById('answer').value.trim();
      const correct = current.A.trim();
      if(input === correct){
        document.getElementById('status').innerHTML = "<span style='color:green'>Excellent! ✅</span>";
        setTimeout(showRandomWord, 1000);
      } else {
        document.getElementById('status').innerHTML = `<span style='color:red'>Not quite. It's ${correct}</span>`;
        saveError(current.B, correct);
      }
    }

    function saveError(eng, chi){
      if(!wrongWords.some(w=>w.English===eng)){
        wrongWords.push({English:eng, Chinese:chi});
        localStorage.setItem('wrongWords', JSON.stringify(wrongWords));
      }
    }

    function speakCurrentWord(){
      const msg = new SpeechSynthesisUtterance(current.A);
      msg.lang = 'zh-CN';
      window.speechSynthesis.speak(msg);
    }

    // MATCHING GAME LOGIC
    function loadMatchingGame(){
      const board = document.getElementById('matchingBoard');
      board.innerHTML = '';
      const ch = document.getElementById('chapterSelect').value || Object.keys(vocabData)[0];
      if(!vocabData[ch]) return;

      let items = [...vocabData[ch]].sort(() => 0.5 - Math.random()).slice(0, 5);
      let leftSide = items.map(i => ({text: i.B, pair: i.A, type: 'eng'}));
      let rightSide = items.map(i => ({text: i.A, pair: i.B, type: 'chi'})).sort(() => 0.5 - Math.random());

      [...leftSide, ...rightSide].forEach(item => {
        const div = document.createElement('div');
        div.className = 'match-item';
        div.textContent = item.text;
        div.onclick = () => handleMatchClick(div, item);
        board.appendChild(div);
      });
    }

    function handleMatchClick(el, item){
      if(el.classList.contains('correct')) return;

      if(!selectedMatch){
        selectedMatch = {el, item};
        el.classList.add('selected');
      } else {
        if(selectedMatch.item.pair === item.text){
          el.classList.add('correct');
          selectedMatch.el.classList.remove('selected');
          selectedMatch.el.classList.add('correct');
          selectedMatch = null;
        } else {
          selectedMatch.el.classList.remove('selected');
          selectedMatch = null;
        }
      }
    }

    // Standard list loaders...
    function loadVocabList(){
      const c=document.getElementById('vocabList');
      c.innerHTML='<div class="card"><h2>Library</h2></div>';
      for(const ch in vocabData){
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<h3>${ch}</h3>`;
        const t = document.createElement('table');
        t.innerHTML = '<thead><tr><th>English</th><th>Chinese</th></tr></thead><tbody></tbody>';
        vocabData[ch].forEach(w=>{
          t.querySelector('tbody').innerHTML += `<tr><td>${w.B}</td><td>${w.A}</td></tr>`;
        });
        div.appendChild(t);
        c.appendChild(div);
      }
    }

    function loadParagraph(){
      const ch=document.getElementById('paragraphSelect').value;
      document.getElementById('paragraphText').textContent = ch ? paragraphData[ch] : 'Select a chapter to read.';
    }

    function loadConversation(){
      const ch=document.getElementById('conversationSelect').value;
      const container=document.getElementById('conversationText');
      container.innerHTML='';
      if(!ch)return;
      conversationData[ch].split('\n').forEach(line=>{
        const div=document.createElement('div');
        div.className = `bubble ${line.startsWith('小李') ? 'xiaoli' : 'xiaowang'}`;
        div.textContent=line.trim();
        container.appendChild(div);
      });
    }

    function updateRetryTable(){
      const tbody=document.querySelector('#retryTable tbody');
      tbody.innerHTML = wrongWords.map(w => `<tr><td>${w.English}</td><td>${w.Chinese}</td></tr>`).join('');
    }

    function clearRetryHistory(){
      localStorage.removeItem('wrongWords');
      wrongWords = [];
      updateRetryTable();
    }
  </script>
</body>
</html>
