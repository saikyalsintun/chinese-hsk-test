<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LingoFlow Mobile</title>
  <style>
    :root {
      --primary: #58cc02;
      --primary-dark: #46a302;
      --error: #ff4b4b;
      --bg: #ffffff;
      --text: #3c3c3c;
      --card-bg: #f7f7f7;
      --border: #e5e5e5;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
    
    body { 
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0; padding: 0 0 85px 0;
      display: flex; flex-direction: column; align-items: center;
    }

    body.dark-mode {
      --bg: #131f24; --text: #eeeeee; --card-bg: #202f36; --border: #37464f;
    }

    /* Top App Bar */
    .app-bar {
      width: 100%;
      position: sticky; top: 0;
      background: var(--bg);
      padding: 15px;
      text-align: center;
      border-bottom: 2px solid var(--border);
      z-index: 100;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed; bottom: 0;
      width: 100%; height: 75px;
      background: var(--bg);
      border-top: 2px solid var(--border);
      display: flex; justify-content: space-around; align-items: center;
      z-index: 1000;
    }

    .nav-item {
      display: flex; flex-direction: column; align-items: center;
      color: #afafaf; font-size: 11px; font-weight: bold; cursor: pointer;
    }
    .nav-item.active { color: var(--primary); }
    .nav-icon { font-size: 22px; margin-bottom: 2px; }

    /* Content Area */
    .app-container { width: 100%; max-width: 450px; padding: 15px; }
    .section { display: none; animation: fadeIn 0.3s ease; }
    .visible { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Matching Game Specific Styles */
    .matching-columns {
      display: flex; gap: 15px; width: 100%; margin-top: 10px;
    }
    .column { flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .column-header { text-align: center; font-weight: bold; font-size: 12px; color: #afafaf; margin-bottom: 5px; }

    .match-tile {
      padding: 18px 10px;
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: 12px;
      text-align: center;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      min-height: 60px;
      display: flex; align-items: center; justify-content: center;
    }
    .match-tile.selected { border-color: #84d8ff; background: #ddf4ff; color: #1899d6; transform: scale(0.98); }
    .match-tile.correct { border-color: #b8f28b; background: #d7ffb8; color: #58a700; opacity: 0.4; pointer-events: none; }

    /* UI Components */
    .card { background: var(--card-bg); padding: 25px; border-radius: 20px; border: 2px solid var(--border); margin-bottom: 15px; text-align: center; }
    .btn-main {
      width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 16px;
      font-size: 18px; font-weight: bold; box-shadow: 0 4px 0 var(--primary-dark); cursor: pointer;
    }
    .btn-main:active { transform: translateY(4px); box-shadow: none; }
    
    input {
      width: 100%; padding: 16px; border: 2px solid var(--border); border-radius: 16px;
      margin: 15px 0; background: var(--card-bg); color: var(--text); font-size: 18px;
    }

    select {
      width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--border);
      background: var(--card-bg); color: var(--text); margin-bottom: 15px;
    }
  </style>
</head>
<body>

  <div class="app-bar">
    <select id="chapterSelect" onchange="changeChapter()">
      <option value="">Select Chapter</option>
    </select>
  </div>

  <div class="app-container">
    
    <div id="vocab" class="section visible">
      <div class="card">
        <div style="font-size: 36px; font-weight: bold;" id="word">Hi!</div>
        <button onclick="speakWord()" style="background:none; border:none; font-size:28px; margin-top:10px;">🔊</button>
      </div>
      <input type="text" id="answer" placeholder="Type Chinese...">
      <button class="btn-main" onclick="checkAnswer()">CHECK</button>
      <div id="status" style="margin-top:20px; text-align:center; font-weight:bold;"></div>
    </div>

    <div id="match" class="section">
      <div class="matching-columns">
        <div class="column">
          <div class="column-header">ENGLISH</div>
          <div id="leftCol"></div>
        </div>
        <div class="column">
          <div class="column-header">CHINESE</div>
          <div id="rightCol"></div>
        </div>
      </div>
      <button class="btn-main" style="margin-top:25px; background:#1899d6; box-shadow:0 4px 0 #127ba9;" onclick="initMatchGame()">NEW SET</button>
    </div>

    <div id="paragraph" class="section">
      <div class="card" id="paragraphText" style="text-align:left; line-height:1.8; font-size:18px;"></div>
    </div>

    <div id="retry" class="section">
      <div id="mistakeList"></div>
      <button class="btn-main" style="background:var(--error); box-shadow:0 4px 0 #d33131;" onclick="clearMistakes()">CLEAR ALL</button>
    </div>

  </div>

  <nav class="bottom-nav">
    <div class="nav-item active" onclick="nav('vocab')"><span class="nav-icon">⭐</span>Learn</div>
    <div class="nav-item" onclick="nav('match')"><span class="nav-icon">🧩</span>Match</div>
    <div class="nav-item" onclick="nav('paragraph')"><span class="nav-icon">📚</span>Read</div>
    <div class="nav-item" onclick="nav('retry')"><span class="nav-icon">🔄</span>Review</div>
    <div class="nav-item" onclick="toggleDark()"><span class="nav-icon">🌗</span>Dark</div>
  </nav>

  <script>
    let vocabData = {}, paragraphData = {};
    let currentCh = "", currentWordObj = {};
    let selLeft = null, selRight = null;
    let mistakes = JSON.parse(localStorage.getItem('mistakes') || '[]');

    // Load Files
    Promise.all([
      fetch('HSK 6.json').then(r=>r.json()).catch(()=>({"Demo":[{"A":"苹果","B":"Apple"},{"A":"香蕉","B":"Banana"},{"A":"猫","B":"Cat"},{"A":"狗","B":"Dog"}]})),
      fetch('Paragraph.json').then(r=>r.json()).catch(()=>({"Demo":"Welcome to your learning app!"}))
    ]).then(([v, p]) => {
      vocabData = v; paragraphData = p;
      const sel = document.getElementById('chapterSelect');
      Object.keys(v).forEach(name => sel.add(new Option(name, name)));
    });

    function nav(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById(id).classList.add('visible');
      event.currentTarget.classList.add('active');
      if(id === 'match') initMatchGame();
      if(id === 'retry') renderMistakes();
      if(id === 'paragraph') loadPara();
    }

    function changeChapter() {
      currentCh = document.getElementById('chapterSelect').value;
      if(!currentCh) return;
      newWord();
      if(document.getElementById('match').classList.contains('visible')) initMatchGame();
    }

    // --- Learn Logic ---
    function newWord() {
      const list = vocabData[currentCh];
      currentWordObj = list[Math.floor(Math.random() * list.length)];
      document.getElementById('word').textContent = currentWordObj.B;
      document.getElementById('answer').value = '';
      document.getElementById('status').textContent = '';
    }

    function checkAnswer() {
      const user = document.getElementById('answer').value.trim();
      if(user === currentWordObj.A) {
        document.getElementById('status').innerHTML = "✅ Great!";
        setTimeout(newWord, 1000);
      } else {
        document.getElementById('status').innerHTML = "❌ Correct: " + currentWordObj.A;
        if(!mistakes.some(m => m.B === currentWordObj.B)) {
          mistakes.push(currentWordObj);
          localStorage.setItem('mistakes', JSON.stringify(mistakes));
        }
      }
    }

    function speakWord() {
      let m = new SpeechSynthesisUtterance(currentWordObj.A);
      m.lang = 'zh-CN';
      window.speechSynthesis.speak(m);
    }

    // --- Matching Logic (Separated Columns) ---
    function initMatchGame() {
      const leftBox = document.getElementById('leftCol');
      const rightBox = document.getElementById('rightCol');
      leftBox.innerHTML = ''; rightBox.innerHTML = '';
      
      if(!currentCh) return;
      let pool = [...vocabData[currentCh]].sort(() => 0.5 - Math.random()).slice(0, 5);
      
      let leftItems = pool.map(i => ({txt: i.B, pair: i.A})).sort(() => 0.5 - Math.random());
      let rightItems = pool.map(i => ({txt: i.A, pair: i.B})).sort(() => 0.5 - Math.random());

      leftItems.forEach(item => {
        const d = document.createElement('div'); d.className = 'match-tile';
        d.textContent = item.txt;
        d.onclick = () => {
          if(selLeft) selLeft.el.classList.remove('selected');
          selLeft = {el: d, data: item};
          d.classList.add('selected');
          checkMatch();
        };
        leftBox.appendChild(d);
      });

      rightItems.forEach(item => {
        const d = document.createElement('div'); d.className = 'match-tile';
        d.textContent = item.txt;
        d.onclick = () => {
          if(selRight) selRight.el.classList.remove('selected');
          selRight = {el: d, data: item};
          d.classList.add('selected');
          checkMatch();
        };
        rightBox.appendChild(d);
      });
    }

    function checkMatch() {
      if(selLeft && selRight) {
        if(selLeft.data.pair === selRight.data.txt) {
          selLeft.el.classList.add('correct');
          selRight.el.classList.add('correct');
          selLeft = null; selRight = null;
        } else {
          const l = selLeft.el, r = selRight.el;
          setTimeout(() => { l.classList.remove('selected'); r.classList.remove('selected'); }, 300);
          selLeft = null; selRight = null;
        }
      }
    }

    function loadPara() { document.getElementById('paragraphText').textContent = paragraphData[currentCh] || "No content."; }
    function renderMistakes() {
      const list = document.getElementById('mistakeList');
      list.innerHTML = mistakes.length ? '' : '<p style="text-align:center">All clear!</p>';
      mistakes.forEach(m => {
        list.innerHTML += `<div class="card" style="padding:15px; margin-bottom:10px;">${m.B} = ${m.A}</div>`;
      });
    }
    function clearMistakes() { mistakes = []; localStorage.removeItem('mistakes'); renderMistakes(); }
    function toggleDark() { document.body.classList.toggle('dark-mode'); }
  </script>
</body>
</html>
